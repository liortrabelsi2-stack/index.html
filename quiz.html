<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de Quiz IA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; color: #a78bfa; }
    .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 28px; }

    label { display: block; font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; margin-top: 18px; }
    label:first-of-type { margin-top: 0; }

    input[type="password"],
    textarea,
    select {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus,
    textarea:focus,
    select:focus { border-color: #7c3aed; }

    textarea { resize: vertical; min-height: 160px; font-family: inherit; }

    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px 24px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #7c3aed; color: #fff; width: 100%; margin-top: 24px; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-outline { background: transparent; border: 1px solid #2d2d4e; color: #94a3b8; }
    .btn-outline:hover { border-color: #7c3aed; color: #a78bfa; }

    .error {
      background: #2d0c0c;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      margin-top: 16px;
    }

    /* LOADER */
    #screen-loading { text-align: center; padding: 20px 0; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #2d2d4e;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #94a3b8; font-size: 0.95rem; }

    /* QUIZ */
    .quiz-header { margin-bottom: 20px; }
    .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .quiz-count { font-size: 0.85rem; color: #64748b; font-weight: 600; }

    .progress-bar-wrap { background: #0f0f1a; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #7c3aed; border-radius: 99px; transition: width 0.4s ease; }

    .question-text { font-size: 1.1rem; font-weight: 600; line-height: 1.5; margin: 22px 0 18px; }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 13px 16px;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .choice-btn:hover:not(:disabled) { border-color: #7c3aed; background: #16123a; }
    .choice-btn.correct { background: #052e16; border-color: #16a34a; color: #86efac; }
    .choice-btn.wrong   { background: #2d0c0c; border-color: #dc2626; color: #fca5a5; }
    .choice-btn:disabled { cursor: default; }

    .quiz-nav { display: flex; gap: 12px; margin-top: 24px; }
    .quiz-nav .btn { flex: 1; }

    /* RESULTS */
    .score-big { text-align: center; margin: 10px 0 28px; }
    .score-big .score-num { font-size: 3.5rem; font-weight: 800; color: #a78bfa; }
    .score-big .score-label { font-size: 0.9rem; color: #64748b; margin-top: 4px; }

    .result-item {
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .result-item .q-text { font-weight: 600; font-size: 0.95rem; margin-bottom: 10px; }
    .result-tag {
      display: inline-block;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 2px 8px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .tag-correct { background: #052e16; color: #86efac; }
    .tag-wrong   { background: #2d0c0c; color: #fca5a5; }
    .result-answers { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
    .result-expl { font-size: 0.85rem; color: #64748b; border-left: 3px solid #2d2d4e; padding-left: 10px; }

    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>
<div class="card">

  <!-- ÉCRAN CONFIG -->
  <div id="screen-config" class="screen active">
    <h1>Générateur de Quiz IA</h1>
    <p class="subtitle">Colle un texte, choisis le format, et laisse l'IA faire le reste.</p>

    <label>Clé API OpenAI</label>
    <input type="password" id="api-key" placeholder="sk-..." />

    <label>Texte source</label>
    <textarea id="source-text" placeholder="Colle ici le texte à partir duquel générer le quiz (min. 100 caractères)..."></textarea>

    <div class="row">
      <div>
        <label>Nombre de questions</label>
        <select id="num-questions">
          <option value="5">5 questions</option>
          <option value="10" selected>10 questions</option>
          <option value="15">15 questions</option>
        </select>
      </div>
      <div>
        <label>Type de quiz</label>
        <select id="quiz-type">
          <option value="QCM">QCM (4 choix)</option>
          <option value="VF">Vrai / Faux</option>
        </select>
      </div>
    </div>

    <div id="config-error" class="error" style="display:none;"></div>
    <button class="btn btn-primary" onclick="startGeneration()">Générer le quiz</button>
  </div>

  <!-- ÉCRAN LOADING -->
  <div id="screen-loading" class="screen">
    <div class="spinner"></div>
    <p class="loading-text">Génération en cours…</p>
  </div>

  <!-- ÉCRAN QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="quiz-meta">
        <span class="quiz-count" id="quiz-count">Question 1 / 10</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="choices" id="choices"></div>
    <div class="quiz-nav">
      <button class="btn btn-outline" onclick="navigate(-1)">← Précédent</button>
      <button class="btn btn-outline" onclick="navigate(1)">Suivant →</button>
    </div>
  </div>

  <!-- ÉCRAN RÉSULTATS -->
  <div id="screen-results" class="screen">
    <h1>Résultats</h1>
    <div class="score-big">
      <div class="score-num" id="score-display"></div>
      <div class="score-label">bonnes réponses</div>
    </div>
    <div id="results-list"></div>
    <button class="btn btn-primary" onclick="replay()" style="margin-top:8px;">Rejouer</button>
  </div>

</div>

<script>
  let appState = 'config';
  let questions = [];
  let userAnswers = [];
  let currentIndex = 0;

  function setState(state) {
    appState = state;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + state).classList.add('active');
  }

  function showError(msg) {
    const el = document.getElementById('config-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function startGeneration() {
    document.getElementById('config-error').style.display = 'none';

    const apiKey = document.getElementById('api-key').value.trim();
    const text = document.getElementById('source-text').value.trim();
    const n = document.getElementById('num-questions').value;
    const type = document.getElementById('quiz-type').value;

    if (!apiKey) { showError('Veuillez entrer votre clé API.'); return; }
    if (text.length < 100) { showError('Le texte est trop court (minimum 100 caractères).'); return; }

    setState('loading');

    const typeLabel = type === 'QCM'
      ? 'QCM avec exactement 4 choix par question'
      : 'Vrai/Faux (choices doit être ["Vrai","Faux"])';

    const prompt = `Tu es un générateur de quiz. À partir du texte suivant, génère exactement ${n} questions de type ${typeLabel}.

Réponds UNIQUEMENT avec un tableau JSON valide, sans texte avant ni après, sans markdown, sans balises code.

Format obligatoire :
[
  {
    "question": "...",
    "choices": ["choix A", "choix B", "choix C", "choix D"],
    "correct_index": 0,
    "explanation": "..."
  }
]

Pour Vrai/Faux : choices doit être ["Vrai", "Faux"] et correct_index 0 ou 1.

Texte source :
${text}`;

    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.7
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message || response.statusText;
        setState('config');
        showError(`Erreur API (${response.status}) : ${msg}`);
        return;
      }

      const data = await response.json();
      const raw = data.choices[0].message.content.trim();

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch {
        setState('config');
        showError('La réponse de l\'IA était invalide, réessayez.');
        return;
      }

      questions = parsed;
      userAnswers = new Array(questions.length).fill(null);
      currentIndex = 0;
      renderQuestion();
      setState('quiz');

    } catch (e) {
      setState('config');
      showError('Erreur réseau : ' + e.message);
    }
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    const total = questions.length;

    document.getElementById('quiz-count').textContent = `Question ${currentIndex + 1} / ${total}`;
    document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / total) * 100}%`;
    document.getElementById('question-text').textContent = q.question;

    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';

    q.choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;

      const answered = userAnswers[currentIndex] !== null;
      if (answered) {
        btn.disabled = true;
        if (i === q.correct_index) btn.classList.add('correct');
        else if (i === userAnswers[currentIndex]) btn.classList.add('wrong');
      }

      btn.addEventListener('click', () => selectAnswer(i));
      choicesEl.appendChild(btn);
    });
  }

  function selectAnswer(index) {
    if (userAnswers[currentIndex] !== null) return;
    userAnswers[currentIndex] = index;
    renderQuestion();

    // auto-advance after short delay if not last question
    if (currentIndex < questions.length - 1) {
      setTimeout(() => { currentIndex++; renderQuestion(); }, 900);
    } else {
      // Check if all answered
      const allDone = userAnswers.every(a => a !== null);
      if (allDone) setTimeout(showResults, 1000);
    }
  }

  function navigate(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= questions.length) return;
    currentIndex = next;
    renderQuestion();
  }

  function showResults() {
    const correct = questions.filter((q, i) => userAnswers[i] === q.correct_index).length;
    document.getElementById('score-display').textContent = `${correct} / ${questions.length}`;

    const list = document.getElementById('results-list');
    list.innerHTML = '';

    questions.forEach((q, i) => {
      const isCorrect = userAnswers[i] === q.correct_index;
      const userChoice = userAnswers[i] !== null ? q.choices[userAnswers[i]] : 'Sans réponse';
      const correctChoice = q.choices[q.correct_index];

      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        <div class="q-text">${i + 1}. ${q.question}</div>
        <div>
          <span class="result-tag ${isCorrect ? 'tag-correct' : 'tag-wrong'}">${isCorrect ? '✓ Correct' : '✗ Incorrect'}</span>
        </div>
        <div class="result-answers">
          Ta réponse : <strong>${userChoice}</strong>${!isCorrect ? ` &nbsp;|&nbsp; Bonne réponse : <strong>${correctChoice}</strong>` : ''}
        </div>
        <div class="result-expl">${q.explanation}</div>
      `;
      list.appendChild(item);
    });

    setState('results');
  }

  function replay() {
    userAnswers = new Array(questions.length).fill(null);
    currentIndex = 0;
    renderQuestion();
    setState('quiz');
  }
</script>
</body>
</html>
